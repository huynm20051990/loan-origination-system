server.port: 7007
server.error.include-message: always

spring.application.name: notification

spring.threads.virtual.enabled: true

# --- ADDED DB CONFIGURATION START ---
spring.jpa:
  hibernate.ddl-auto: update
  show-sql: true
  properties:
    hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate.format_sql: true

spring.datasource:
  url: jdbc:postgresql://notify-db:5432/notification-db
  username: ${POSTGRES_USR}
  password: ${POSTGRES_PWD}
  driver-class-name: org.postgresql.Driver

spring.datasource.hikari:
  initializationFailTimeout: 60000
  maximum-pool-size: 10

# --- Spring Cloud Stream & Kafka Configuration ---
spring.cloud:
  function:
    definition: consumeUnderwritingCompleted
  stream:
    bindings:
      consumeUnderwritingCompleted-in-0:
        destination: application.underwriting_completed
        group: notification-service-group
        content-type: application/json
    kafka:
      binder:
        brokers: localhost:9092 # Default for local dev
        auto-create-topics: true
# --- Spring Cloud Stream & Kafka Configuration ---

# --- ADDED DB CONFIGURATION END ---

# Health checks now only focus on the DB and Disk, not RabbitMQ
management:
  endpoint:
    health:
      show-details: always
  health:
    defaults.enabled: true

logging:
  level:
    root: INFO
    com.loan.origination.system: INFO
    org.hibernate.SQL: DEBUG

---
spring.config.activate.on-profile: docker

server.port: 80
spring.datasource.url: jdbc:postgresql://notify-db/notification-db

# Override Kafka broker for Docker network
spring.cloud.stream.kafka.binder.brokers: kafka:29092

---
spring.config.activate.on-profile: prod

spring.datasource.url: jdbc:postgresql://172.17.0.1:5432/notification-db
logging.level.org.hibernate.SQL: WARN

# Override Kafka broker for Prod
spring.cloud.stream.kafka.binder.brokers: kafka-prod-broker:9092