server.port: 7004
server.error.include-message: always

spring.application.name: home

spring.threads.virtual.enabled: true

# --- ADDED AI CONFIGURATION START ---
spring:
  ai:
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
        project-id: ${SPRING_AI_GOOGLE_GENAI_PROJECT_ID}
        embedding:
          enabled: true
          options:
            model: text-embedding-004
    vectorstore:
      pgvector:
        # NOTE: Gemini's default is 768. Ensure your SQL column matches!
        dimensions: 768
        distance-type: COSINE
        index-type: HNSW
# --- ADDED AI CONFIGURATION END ---

# --- ADDED DB CONFIGURATION START ---
spring.jpa:
  hibernate.ddl-auto: update
  show-sql: true
  properties:
    hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate.format_sql: true

spring.datasource:
  url: jdbc:postgresql://postgres:5432/home-db
  username: ${POSTGRES_USR}
  password: ${POSTGRES_PWD}
  driver-class-name: org.postgresql.Driver

spring.datasource.hikari:
  initializationFailTimeout: 60000
  maximum-pool-size: 10

# --- ADDED DB CONFIGURATION END ---

# Health checks now only focus on the DB and Disk, not RabbitMQ
management:
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false # Explicitly disable RabbitMQ health checks

logging:
  level:
    root: INFO
    com.loan.origination.system: INFO
    org.hibernate.SQL: DEBUG

---
spring.config.activate.on-profile: docker

server.port: 80
spring.datasource.url: jdbc:postgresql://postgres/home-db

---
spring.config.activate.on-profile: prod

spring.datasource.url: jdbc:postgresql://172.17.0.1:5432/home-db
logging.level.org.hibernate.SQL: WARN