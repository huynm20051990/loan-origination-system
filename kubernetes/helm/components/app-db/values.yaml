fullnameOverride: app-db

annotations:
  sidecar.istio.io/inject: "false"

image:
  repository: pgvector
  name: pgvector
  tag: pg16
  pullPolicy: IfNotPresent

# Required for Debezium / CDC
command: [ "postgres", "-c", "wal_level=logical" ]

env:
  POSTGRES_DB: app-db
  POSTGRES_USER: ${POSTGRES_USR}
  POSTGRES_PASSWORD: ${POSTGRES_PWD}

persistence:
  enabled: true
  mountPath: /docker-entrypoint-initdb.d
  # This would map to ./database/app-init in your compose

ports:
  - containerPort: 5432

service:
  ports:
    - name: app-db
      port: 5432 # Internal K8s port (Compose used 5433:5432)

resources:
  limits:
    memory: 512Mi