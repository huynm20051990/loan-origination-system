{{- define "common.istio_base" -}}
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: app-service-require-jwt
spec:
  action: ALLOW
  rules:
    - {}
  selector:
    matchLabels:
      app.kubernetes.io/name: app-service
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
spec:
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: app-service-request-authentication
spec:
  jwtRules:
    - forwardOriginalToken: true
      issuer: http://auth-server
      jwksUri: http://auth-server.loan-origination-system.svc.cluster.local/oauth2/jwks
  selector:
    matchLabels:
      app.kubernetes.io/name: app-service
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: loan-origination-system-gw
spec:
  selector:
    istio: ingressgateway
  servers:
    - hosts:
        - minikube.me
      port:
        name: https
        number: 443
        protocol: HTTPS
      tls:
        credentialName: loan-origination-system-certificate
        mode: SIMPLE
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: loan-origination-system-vs
spec:
  gateways:
    - loan-origination-system-gw
  hosts:
    - minikube.me
  http:
    - match:
        - uri:
            prefix: /oauth2
      route:
        - destination:
            host: auth-server
    - match:
        - uri:
            prefix: /login
      route:
        - destination:
            host: auth-server
    - match:
        - uri:
            prefix: /error
      route:
        - destination:
            host: auth-server
    - match:
        - uri:
            prefix: /api/v1/applications
      route:
        - destination:
            host: app-service
            port:
              number: 80
    - match:
        - uri:
            prefix: /openapi
      route:
        - destination:
            host: app-service
            port:
              number: 80
    - match:
        - uri:
            prefix: /webjars
      route:
        - destination:
            host: app-service
            port:
              number: 80
    - match:
        - uri:
            prefix: /api/v1/homes
      route:
        - destination:
            host: home-service
            port:
              number: 8080
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: app-ui
            port: { number: 80 }
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: health-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - hosts:
        - "health.minikube.me"
      port:
        number: 443
        name: https-health
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: loan-origination-system-certificate
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: health-vs
spec:
  hosts:
    - "health.minikube.me"
  gateways:
    - health-gateway
  http:
    - route:
        - destination:
            host: app-service
            port:
              number: 4004
{{- end -}}
