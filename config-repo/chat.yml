server.port: 7008
server.error.include-message: always

spring.application.name: chat-service
spring.threads.virtual.enabled: true

spring:
  ai:
    model:
      chat: google-genai
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
    chat:
      memory:
        repository:
          cassandra:
            keyspace: springframework
            table: chat_memory

  cassandra:
    contact-points: easy-apply-assessment-cassandra
    port: 9042
    local-datacenter: dc1
    schema-action: create_if_not_exists
    request:
      timeout: 10s

  jpa:
    hibernate.ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.springframework.boot.test.autoconfigure.orm.jpa.DataJpaTest

  datasource:
    url: jdbc:postgresql://chat-pg:5432/chat-db
    username: ${POSTGRES_USR}
    password: ${POSTGRES_PWD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initializationFailTimeout: 60000
      maximum-pool-size: 10

spring.security.oauth2.resourceserver.jwt.issuer-uri: http://${app.auth-server}

home-service:
  base-url: http://easy-apply-home-service

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

---
spring.config.activate.on-profile: docker

server.port: 80

spring:
  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
