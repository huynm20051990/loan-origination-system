server.port: 7004
server.error.include-message: always

spring.application.name: home

spring.threads.virtual.enabled: true

# --- ADDED AI CONFIGURATION START ---
spring:
  ai:
    model:
      embedding:
        text: google-genai
      chat: google-genai

    google:
      genai:
        embedding:
          api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
          enable: true
          text:
            options:
              model: gemini-embedding-001
              dimensions: 768
        chat:
          options:
            model: gemini-2.5-flash

    vectorstore:
      pgvector:
        table-name: home_embeddings
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW
# --- ADDED AI CONFIGURATION END ---

# --- ADDED DB CONFIGURATION START ---
spring.jpa:
  hibernate.ddl-auto: update
  show-sql: true
  properties:
    hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate.format_sql: true

spring.datasource:
  url: jdbc:postgresql://home-pg:5432/home-db
  username: ${POSTGRES_USR}
  password: ${POSTGRES_PWD}
  driver-class-name: org.postgresql.Driver

spring.datasource.hikari:
  initializationFailTimeout: 60000
  maximum-pool-size: 10

# --- ADDED DB CONFIGURATION END ---

# Health checks now only focus on the DB and Disk, not RabbitMQ
management:
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false # Explicitly disable RabbitMQ health checks

logging:
  level:
    root: INFO
    com.loan.origination.system: INFO
    org.hibernate.SQL: DEBUG

---
spring.config.activate.on-profile: docker

server.port: 80
spring.datasource.url: jdbc:postgresql://home-pg/home-db

---
spring.config.activate.on-profile: prod

server.port: 80
spring.datasource.url: jdbc:postgresql://host.minikube.internal:5432/home-db
logging.level.org.hibernate.SQL: WARN