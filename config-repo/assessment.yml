server.port: 7006
server.error.include-message: always

spring.application.name: assessment
spring.threads.virtual.enabled: true

# --- Spring Cloud Stream & Kafka Configuration ---
spring.cloud:
  function:
    definition: consumeApplicationSubmittedEvent
  stream:
    bindings:
      consumeApplicationSubmittedEvent-in-0:
        destination: application.application_submitted
        group: assessment-service-group
        content-type: application/json
    kafka:
      binder:
        brokers: localhost:9092 # Default for local dev
        auto-create-topics: true
# --- Spring Cloud Stream & Kafka Configuration ---

# --- DB CONFIGURATION START ---
spring.jpa:
  hibernate.ddl-auto: update
  show-sql: true
  properties:
    hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate.format_sql: true

spring.datasource:
  url: jdbc:postgresql://assessment-pg:5432/assessment-db
  username: ${POSTGRES_USR}
  password: ${POSTGRES_PWD}
  driver-class-name: org.postgresql.Driver

spring.datasource.hikari:
  initializationFailTimeout: 60000
  maximum-pool-size: 10

# --- DB CONFIGURATION END ---

# Health checks now only focus on the DB and Disk, not RabbitMQ
management:
  endpoint:
    health:
      show-details: always
  health:
    defaults.enabled: true

logging:
  level:
    root: INFO
    com.loan.origination.system: INFO
    org.hibernate.SQL: DEBUG

---
spring.config.activate.on-profile: docker

server.port: 80
spring.datasource.url: jdbc:postgresql://assessment-pg/assessment-db

---
spring.config.activate.on-profile: prod

server.port: 80
spring.datasource.url: jdbc:postgresql://host.minikube.internal:5434/assessment-db
logging.level.org.hibernate.SQL: WARN