server.port: 7006
server.error.include-message: always

spring.application.name: assessment
spring.threads.virtual.enabled: true

#--- Start Spring AI config ---
spring:
  ai:
    model:
      embedding:
        text: google-genai
      chat: google-genai

    google:
      genai:
        embedding:
          api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
          enable: true
          text:
            options:
              model: gemini-embedding-001
              dimensions: 768
        chat:
          options:
            model: gemini-2.5-flash

    vectorstore:
      pgvector:
        table-name: assessment_embeddings
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

    mcp:
      client:
        sse:
          enabled: true
          connections:
            assessment-server:
              url: "http://easy-apply-assessment-mcp-server:80/mcp"

    chat:
      memory:
        cassandra:
          keyspace: assessment_keyspace
          messages-column: chat_messages
          table: chat_memory
  cassandra:
    contact-points: easy-apply-assessment-cassandra
    port: 9042
    local-datacenter: dc1
    schema-action: create_if_not_exists
    request:
      timeout: 10s
#--- End Spring AI config ---

# --- Spring Cloud Stream & Kafka Configuration ---
spring.cloud:
  function:
    definition: consumeApplicationSubmittedEvent
  stream:
    bindings:
      consumeApplicationSubmittedEvent-in-0:
        destination: application.application_submitted
        group: assessment-service-group
        content-type: application/json
    kafka:
      binder:
        auto-create-topics: true
# --- Spring Cloud Stream & Kafka Configuration ---

# --- DB CONFIGURATION START ---
spring.jpa:
  hibernate.ddl-auto: update
  show-sql: true
  properties:
    hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate.format_sql: true

spring.datasource:
  url: jdbc:postgresql://assessment-pg:5432/assessment-db
  username: ${POSTGRES_USR}
  password: ${POSTGRES_PWD}
  driver-class-name: org.postgresql.Driver

spring.datasource.hikari:
  initializationFailTimeout: 60000
  maximum-pool-size: 10

# --- DB CONFIGURATION END ---

# Health checks now only focus on the DB and Disk, not RabbitMQ
management:
  endpoint:
    health:
      show-details: always
  health:
    defaults.enabled: true

logging:
  level:
    root: INFO
    com.loan.origination.system: INFO
    org.hibernate.SQL: DEBUG

---
spring.config.activate.on-profile: docker

server.port: 80
spring.datasource.url: jdbc:postgresql://assessment-pg/assessment-db

# Override Kafka broker for Docker network
spring.cloud.stream.kafka.binder.brokers: kafka:29092


---
spring.config.activate.on-profile: prod

server.port: 80
spring.datasource.url: jdbc:postgresql://host.minikube.internal:5434/assessment-db
logging.level.org.hibernate.SQL: WARN