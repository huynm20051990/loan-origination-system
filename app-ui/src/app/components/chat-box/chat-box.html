<!-- Toggle button — hidden when the chat panel is open -->
@if (!isOpen()) {
<button
  mat-fab
  class="chat-toggle-btn"
  aria-label="Open AI chat"
  (click)="toggle()"
>
  <mat-icon>chat</mat-icon>
</button>
}

<!-- Fixed side panel -->
<aside class="chat-panel" [class.open]="isOpen()" aria-label="AI chat panel">

  <div class="panel-header">
    <mat-icon class="panel-icon">auto_awesome</mat-icon>
    <span>AI Home Assistant</span>
    @if (messages().length > 0) {
      <button mat-icon-button type="button" aria-label="Reset chat" (click)="onReset()">
        <mat-icon>refresh</mat-icon>
      </button>
    }
    <button mat-icon-button (click)="toggle()" aria-label="Close chat panel">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>

  <ul class="chat-messages" aria-label="Chat messages" aria-live="polite">
    @for (message of messages(); track $index) {
      <li class="chat-message" [class.user]="message.role === 'user'" [class.assistant]="message.role === 'assistant'">
        <span class="bubble">{{ message.content }}<span *ngIf="message.isStreaming" class="cursor">▋</span></span>
      </li>
    } @empty {
      <li class="empty-hint">
        <mat-icon>home_search</mat-icon>
        <p>Ask me to find homes for you — try <em>"3 beds under $500k in Austin"</em></p>
      </li>
    }
  </ul>

  <form class="chat-input-row" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="query-field">
      <input
        matInput
        [(ngModel)]="queryInput"
        name="query"
        placeholder="Search homes with AI..."
        aria-label="Home search query"
        [disabled]="isLoading()"
      />
    </mat-form-field>

    <button
      mat-icon-button
      type="submit"
      aria-label="Submit query"
      [disabled]="isLoading() || !queryInput.trim()"
    >
      @if (isLoading()) {
        <mat-spinner diameter="20" />
      } @else {
        <mat-icon>send</mat-icon>
      }
    </button>
  </form>

</aside>
