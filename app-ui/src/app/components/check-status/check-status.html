<div class="status-container">
  <mat-card class="status-card">
    <mat-card-header>
      <mat-card-title>Check Your Application Status</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Enter your email</mat-label>
        <input matInput type="email" placeholder="email@example.com" [(ngModel)]="email">
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="primary" (click)="goToDashboard()">
        Check Status
      </button>
    </mat-card-actions>
  </mat-card>
</div>
