<div class="page-container">
  <header class="listings-header">
    <h1>Available Properties</h1>
    <div class="search-bar">
      <mat-form-field appearance="outline">
        <mat-label>Search by address...</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput>
      </mat-form-field>
    </div>
  </header>

  <div class="listings-grid">
    @for (home of homes; track home.id) {
    <mat-card class="home-card">
      <div class="image-wrapper">
        <img mat-card-image [src]="home.imageUrl" alt="Photo of {{home.address}}">
        <div class="price-tag">{{ home.price | currency:'USD':'symbol':'1.0-0' }}</div>
      </div>

      <mat-card-content>
        <h2 class="address">{{ home.address }}</h2>
        <div class="specs">
          <span><mat-icon>bed</mat-icon> {{ home.beds }} Beds</span>
          <span><mat-icon>bathtub</mat-icon> {{ home.baths }} Baths</span>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <button mat-flat-button color="primary" [routerLink]="['/apply', home.id]">
          APPLY NOW
        </button>
      </mat-card-actions>
    </mat-card>
    }
  </div>
</div>
