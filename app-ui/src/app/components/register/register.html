<div class="register-container">
  <mat-card class="register-card">
    <div class="form-header">
      <mat-icon class="header-icon">person_add</mat-icon>
      <h2>Create your Account</h2>
      <p>Start your journey to a better loan experience</p>
    </div>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName" placeholder="John Doe">
          <mat-icon matSuffix>badge</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="name@example.com">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" placeholder="At least 6 characters">
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <div class="terms">
          <p>By registering, you agree to our <a>Terms of Service</a> and <a>Privacy Policy</a>.</p>
        </div>

        <button mat-flat-button color="primary" class="register-btn" [disabled]="registerForm.invalid">
          CREATE ACCOUNT
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer class="form-footer">
      <span>Already have an account? <a routerLink="/login">Sign In</a></span>
    </mat-card-footer>
  </mat-card>
</div>
