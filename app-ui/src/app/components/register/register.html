<div class="auth-wrapper">
  <mat-card class="auth-card" appearance="outlined">
    <div class="auth-header">
      <h1>Register</h1>
    </div>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">

        <div class="form-field-group">
          <label class="input-label">Full Name</label>
          <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <input matInput formControlName="fullName" placeholder="John Doe">
            <mat-icon matSuffix class="subtle-icon">badge</mat-icon>
          </mat-form-field>
        </div>

        <div class="form-field-group">
          <label class="input-label">Email Address</label>
          <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <input matInput formControlName="email" type="email" placeholder="name@company.com">
            <mat-icon matSuffix class="subtle-icon">mail_outline</mat-icon>
          </mat-form-field>
        </div>

        <div class="form-field-group">
          <label class="input-label">Password</label>
          <mat-form-field appearance="outline" subscriptSizing="dynamic">
            <input matInput formControlName="password" type="password" placeholder="Min. 6 characters">
            <mat-icon matSuffix class="subtle-icon">lock_outline</mat-icon>
          </mat-form-field>
        </div>

        <div class="terms-text">
          By clicking "Create Account", you agree to our
          <a routerLink="/terms">Terms</a> and <a routerLink="/privacy">Privacy Policy</a>.
        </div>

        <button mat-flat-button class="submit-btn" [disabled]="registerForm.invalid">
          Create Account
        </button>
      </form>
    </mat-card-content>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Sign In</a></p>
    </div>
  </mat-card>
</div>
